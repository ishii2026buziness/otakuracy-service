name: Service Manifest

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/checkout@v4
        with:
          repository: ishii2025buziness/k12-network-notes
          path: .k12-pe
          token: ${{ secrets.GH_PAT }}

      - uses: astral-sh/setup-uv@v5

      - name: Validate manifest
        run: uv run .k12-pe/tools/validate_manifest.py .
