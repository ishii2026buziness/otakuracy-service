name: Build, test, and deploy

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v5

      - name: Run tests
        working-directory: app
        run: uv run --extra dev pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: container/Containerfile
          push: true
          tags: |
            ghcr.io/ishii2026buziness/otakuracy:latest
            ghcr.io/ishii2026buziness/otakuracy:${{ github.run_id }}

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Deploy
        run: systemctl restart otakuracy
