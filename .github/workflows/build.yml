name: Build, test, and deploy

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v5

      - name: Run tests
        working-directory: app
        run: uv run --extra dev pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: container/Containerfile
          push: true
          tags: |
            ghcr.io/ishii2025buziness/otakuracy-service:latest
            ghcr.io/ishii2025buziness/otakuracy-service:${{ github.run_id }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CI_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy to K12
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 kento@k12 \
            "echo '$GH_TOKEN' | podman login ghcr.io -u '$GH_ACTOR' --password-stdin \
            && podman pull ghcr.io/ishii2025buziness/otakuracy-service:latest \
            && echo 'Deploy OK: otakuracy-service image updated'"
